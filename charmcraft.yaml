name: juju-controller
description: |
  The Juju controller charm is used to expose various pieces
  of functionality of a Juju controller.
summary: |
  The Juju controller.
type: charm

assumes:
- juju >= 4.0

provides:
  dashboard:
    interface: juju-dashboard
  website:
    interface: http
  metrics-endpoint:
    interface: prometheus_scrape

requires:
  charm-tracing:
    interface: tracing
    limit: 1
    optional: true
  charm-tracing-ca-cert:
    interface: certificate_transfer
    limit: 1
    optional: true

peers:
  dbcluster:
    interface: dbcluster

parts:
  charm:
    plugin: uv
    source: .
    build-packages: [git]
    build-snaps: [astral-uv]

platforms:
  ubuntu@24.04:riscv64:
  ubuntu@26.04:riscv64:
